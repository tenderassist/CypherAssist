<!DOCTYPE html>
<html>
  <head>
    <title>Cypher</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body id="top">
    <h1>
      <a class="brand-link" href="index.html" aria-label="Go to home page">
        <img class="brand-logo" src="./Logo.png" alt="" />
        <span class="brand-wordmark">Cypher</span>

    </h1>
    <button
      class="theme-toggle"
      id="themeToggle"
      type="button"

      class="quicksearch"
      id="quicksearch"

      <h2>Reset</h2>
      <p class="page-intro">

      <a id="feedback"></a>

      <button id="resetbtn">Reset</button>
    </main>

    <a class="back-to-top" href="#top" aria-label="Back to top"></a>

    <footer class="app-stamp">
      <p>Cypher v3.1 &bull; Created by Seth Garreth Van Schalkwyk</p>
      <p>Quietly working behind the scenes ;)</p>

    <script src="./reset.mjs" type="module"></script>

    <script src="./backtotop.mjs" type="module"></script>
