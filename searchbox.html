<!DOCTYPE html>
<html>
  <head>
    <title>Cypher</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js"
        }
      }
    </script>
  </head>

  <body id="top">
    <h1>
      <a class="brand-link" href="index.html" aria-label="Go to home page">
        <span class="brand-logo" aria-hidden="true"></span>
        <span class="brand-wordmark">Cypher</span>
      </a>
    </h1>
    <button class="logout-button" type="button">Log out</button>
    <button
      class="theme-toggle"
      id="themeToggle"
      type="button"
      aria-label="Toggle dark mode"
    ></button>
    <input
      type="search"
      class="quicksearch"
      id="quicksearch"
      placeholder="Quick Search"
    />
    <div id="quicksearchResult"></div>

    <nav class="navbar">
      <a class="navitem" href="index.html">Home</a>
      <a class="navitem" href="itemin.html">Item In</a>
      <a class="navitem" href="itemout.html">Item Out</a>
      <a class="navitem-active">Search</a>
      <a class="navitem" href="itemsummary.html">Item Summary</a>
      <a class="navitem" href="officesummary.html">Office Summary</a>
      <a class="navitem" href="outstanding.html">Outstanding</a>
    </nav>

    <main class="page-panel">
      <h2>Search Item</h2>
      <p class="page-intro">
        Look up an item quickly to see where it is currently assigned.
      </p>
      <div class="field-row search-inline-row">
        <span class="field-label">Item</span>
        <div class="search-inline-controls">
          <input
            type="text"
            autocomplete="off"
            id="searchnum"
            class="input"
            placeholder="e.g. 24"
          />
          <button id="searchbtn" class="button-with-icon button-with-icon-search">
            Search
          </button>
        </div>
      </div>

      <div id="feedback" class="search-feedback"></div>
    </main>

    <a class="back-to-top" href="#top" aria-label="Back to top"></a>

    <footer class="app-stamp">
      <p>Cypher v3.2 &bull; Item Tracking Simplified</p>
      <p>Created by S.G. Van Schalkwyk</p>
    </footer>

    <script src="./searchbox.mjs" type="module"></script>
    <script src="./mobilenav.mjs" type="module"></script>
    <script src="./theme.mjs" type="module"></script>
    <script src="./backtotop.mjs" type="module"></script>
    <script src="./outstandingalert.mjs" type="module"></script>
  </body>
</html>
