<!DOCTYPE html>
<html>
  <head>
    <title>Cypher</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js"
        }
      }
    </script>
  </head>

  <body id="top">
    <h1>
      <a class="brand-link" href="index.html" aria-label="Go to home page">
        <span class="brand-logo" aria-hidden="true"></span>
        <span class="brand-wordmark">Cypher</span>
      </a>
    </h1>
    <button class="logout-button" type="button">Log out</button>
    <button
      class="theme-toggle"
      id="themeToggle"
      type="button"
      aria-label="Toggle dark mode"
    ></button>
    <input
      type="search"
      class="quicksearch"
      id="quicksearch"
      placeholder="Quick Search"
    />
    <div id="quicksearchResult"></div>

    <nav class="navbar">
      <a class="navitem" href="addbox.html">Add/Delete Items</a>
      <a class="navitem-active">Add/Delete Offices</a>
      <a class="navitem" href="reset.html">Reset</a>
      <a class="navitem" href="index.html">Back to work</a>
    </nav>

    <main class="page-panel">
      <h2>Add/Delete Offices</h2>
      <p class="page-intro">
        Maintain the live list of active offices available.
      </p>
      <div id="officelist"></div>

      <div class="field-row">
        <span class="field-label">Action</span>
        <select id="adddeloffice">
          <option>Select...</option>
          <option value="add">Add</option>
          <option value="delete">Delete</option>
        </select>
      </div>

      <div class="field-row">
        <span class="field-label">Office Number</span>
        <input
          type="number"
          autocomplete="off"
          id="adddeloffnum"
          class="input"
          placeholder="e.g. 24"
        />
      </div>

      <button id="adddeloffbtn">Enter</button>

      <a id="feedback"></a>
    </main>

    <a class="back-to-top" href="#top" aria-label="Back to top"></a>

    <footer class="app-stamp">
      <p>Cypher v3.2 &bull; Item Tracking Simplified</p>
      <p>Created by S.G. Van Schalkwyk</p>
    </footer>

    <script src="./addoffice.mjs" type="module"></script>
    <script src="./theme.mjs" type="module"></script>
    <script src="./backtotop.mjs" type="module"></script>
  </body>
</html>
