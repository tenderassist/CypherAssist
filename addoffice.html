<!DOCTYPE html>
<html>
  <head>
    <title>Cypher</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body id="top">
    <h1>
      <a class="brand-link" href="index.html" aria-label="Go to home page">
        <img class="brand-logo" src="./Logo.png" alt="" />
        <span class="brand-wordmark">Cypher</span>
      </a>
    </h1>
    <button
      class="theme-toggle"
      id="themeToggle"
      type="button"
      aria-label="Toggle dark mode"
    ></button>
    <input
      type="search"
      class="quicksearch"
      id="quicksearch"
      placeholder="Quick Search"
    />
    <div id="quicksearchResult"></div>

    <nav class="navbar">
      <a class="navitem" href="addbox.html">Add/Delete Boxes</a>
      <a class="navitem-active">Add/Delete Offices</a>
      <a class="navitem" href="reset.html">Reset</a>
      <a class="navitem" href="index.html">Back to work</a>
    </nav>

    <main class="page-panel">
      <h2>Add/Delete Offices</h2>
      <p class="page-intro">
        Manage the office directory used when boxes are checked out and tracked.
      </p>
      <div id="officelist"></div>

      <div class="field-row">
        <span class="field-label">Action</span>
        <select id="adddeloffice">
          <option>Select...</option>
          <option value="add">Add</option>
          <option value="delete">Delete</option>
        </select>
      </div>

      <div class="field-row">
        <span class="field-label">Office Number</span>
        <input
          type="number"
          autocomplete="off"
          id="adddeloffnum"
          class="input"
          placeholder="e.g. '24'"
        />
      </div>

      <a id="feedback"></a>

      <button id="adddeloffbtn">Enter</button>
    </main>

    <a class="back-to-top" href="#top" aria-label="Back to top"></a>

    <footer class="app-stamp">
      <p>Cypher v3.1 &bull; Created by Seth Garreth Van Schalkwyk</p>
      <p>Quietly working behind the scenes ;)</p>
    </footer>

    <script src="./addoffice.mjs" type="module"></script>
    <script src="./theme.mjs" type="module"></script>
    <script src="./backtotop.mjs" type="module"></script>
  </body>
</html>
